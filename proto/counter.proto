syntax = "proto3";

package counter;

option go_package = "github.com/kadenchien/390-final-project/gen/counter";

service CounterService {
  rpc IncrCounter(IncrRequest)   returns (IncrResponse);
  rpc GetCounter(GetRequest)     returns (GetResponse);
  rpc Ping(PingRequest)          returns (PingResponse);
  rpc ViewChange(ViewChangeMsg)  returns (ViewChangeAck);
  rpc Replicate(ReplicateMsg)    returns (ReplicateAck);
  rpc TransferState(TransferReq) returns (TransferResp);
}

// ── Client RPCs ───────────────────────────────────────────────────────────────

message IncrRequest {
  string counter_id = 1;
  string client_id  = 2;
  int64  request_id = 3;
}

message IncrResponse {
  int64  new_value   = 1;
  string redirect_to = 2; // non-empty iff this server is not the leader
}

message GetRequest {
  string counter_id = 1;
}

message GetResponse {
  int64  value       = 1;
  string redirect_to = 2; // non-empty iff this server is not the leader
}

// ── Heartbeat ─────────────────────────────────────────────────────────────────

message PingRequest {
  int64  view_number = 1;
  string sender_id   = 2;
}

message PingResponse {
  bool  ok          = 1;
  int64 view_number = 2;
}

// ── Leader Election (VR-style view change) ────────────────────────────────────

message ViewChangeMsg {
  int64  view_number = 1;
  string sender_id   = 2;
}

message ViewChangeAck {
  bool  accepted    = 1;
  int64 view_number = 2;
}

// ── Replication ───────────────────────────────────────────────────────────────

// Sent by the leader to all followers before acking an IncrCounter.
// Carries both the updated counter value and the reply-cache entry so the
// follower can take over as leader immediately without any catch-up.
message ReplicateMsg {
  string       counter_id       = 1;
  int64        new_value        = 2;
  string       client_id        = 3;
  int64        request_id       = 4;
  IncrResponse cached_response  = 5;
}

message ReplicateAck {
  bool ok = 1;
}

// ── State Transfer (new/recovered replica joining the cluster) ────────────────

message TransferReq {
  string requester_id = 1;
}

// A single entry in the reply cache, used when transferring full state.
message CacheEntry {
  string       client_id  = 1;
  int64        request_id = 2;
  IncrResponse response   = 3;
}

message TransferResp {
  map<string, int64> counters    = 1; // full counter table snapshot
  repeated CacheEntry cache      = 2; // full reply-cache snapshot
  int64               view_number = 3; // current view so joiner starts in sync
}
